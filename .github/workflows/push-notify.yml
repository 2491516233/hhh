name: Push 通知

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 发送 pushplus 通知
        run: |
          curl -X POST "https://www.pushplus.lishutao.com/send" \
            -H "Content-Type: application/json" \
            -d '{
              "token": "${{ secrets.PUSHPLUS_TOKEN }}",
              "title": "hhh 仓库有更新",
              "content": "仓库 hhh 有新提交: ${{ github.event.head_commit.message }}",
              "template": "markdown"
            }'
