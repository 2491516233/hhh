name: Push 通知

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 发送 Server 酱通知
        run: |
          curl -X POST "https://sctapi.ftqq.com/${{ secrets.SCT_TOKEN }}.send" \
            -d "title=hhh 仓库有更新" \
            -d "desp=仓库 hhh 有新提交: ${{ github.event.head_commit.message }}"
